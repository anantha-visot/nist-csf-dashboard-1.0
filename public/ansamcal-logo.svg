  <!-- Yellow circle -->
  <circle cx="80" cy="80" r="78" fill="#F5C200"/>
  <circle cx="80" cy="80" r="68" fill="none" stroke="#E8B400" stroke-width="2"/>

  <!-- AM monogram inside circle -->
  <!-- A -->
  <path d="M38 110 L58 42 L80 95 L102 42 L122 110" stroke="#1B3A8C" stroke-width="9" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  <line x1="52" y1="88" x2="108" y2="88" stroke="#1B3A8C" stroke-width="9" stroke-linecap="round"/>

  <!-- ansa McAL text -->
  <text x="178" y="88"
